    <style>

            margin:0;

        }

            text-align:center;
            color:rgb(218, 25, 18);
        }

        .gallery{
            display:flex;
            flex-wrap:wrap;
            justify-content:center;
            gap:20px;
        }

        .gallery img{
            width:300px;
            height:200px;
            border-radius:10px;
            border:3px solid white;
            box-shadow:0 0 10px rgb(255, 136, 0);
        }

        .gallery img:hover{
            transform:scale(1.05);
            transition:0.3s;
        }

        footer{
            background:#ffa200;

            text-align:center;
            padding:15px;
